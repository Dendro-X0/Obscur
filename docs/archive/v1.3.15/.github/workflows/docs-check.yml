name: docs-check

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/docs-check.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs-check.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/docs-check.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs-check.yml"

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run docs check
        run: pnpm docs:check
