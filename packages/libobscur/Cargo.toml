[package]
name = "libobscur"
version = "0.1.0"
edition = "2021"
description = "Shared core logic for the Obscur project"
authors = ["Obscur Contributors"]

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]
name = "libobscur"

[[bin]]
name = "uniffi-bindgen"
path = "src/bin/uniffi-bindgen.rs"

[dependencies]
uniffi = { version = "0.28.0", features = ["tokio", "cli"] }
chacha20poly1305 = "0.10.1"
aes = "0.8.4"
cbc = "0.1.2"
block-padding = "0.3.3"
base64 = "0.22.1"
hex = "0.4.3"
rand = "0.8.5"
sha2 = "0.10.8"
hkdf = "0.12.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
nostr = { version = "0.38", features = ["nip04", "nip44", "nip59"] }
rayon = "1.10"
num_cpus = "1.16"
rusqlite = { version = "0.31.0", features = ["bundled"] }
tokio = { version = "1.37", features = ["full"] }
tokio-tungstenite = { version = "0.21", features = ["native-tls"] }
url = "2.5"
futures-util = "0.3"
tokio-socks = "0.5"
tracing = "0.1"
tracing-subscriber = "0.3"

[build-dependencies]
uniffi = { version = "0.28.0", features = ["build"] }
