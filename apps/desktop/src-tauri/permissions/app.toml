[[permission]]
identifier = "allow-window-commands"
description = "Window management commands"
commands.allow = [
    "window_minimize",
    "window_maximize",
    "window_unmaximize",
    "window_close",
    "window_show_and_focus",
    "window_is_maximized",
    "window_set_fullscreen",
    "window_is_fullscreen",
    "save_window_state",
    "desktop_get_profile_isolation_snapshot",
    "desktop_list_profiles",
    "desktop_create_profile",
    "desktop_rename_profile",
    "desktop_open_profile_window",
    "desktop_bind_window_profile",
    "desktop_remove_profile"
]

[[permission]]
identifier = "allow-tor-commands"
description = "Tor control commands"
commands.allow = [
    "start_tor",
    "stop_tor",
    "get_tor_status",
    "save_tor_settings"
]

[[permission]]
identifier = "allow-misc-commands"
description = "Miscellaneous app commands"
commands.allow = [
    "check_for_updates",
    "install_update",
    "show_notification",
    "request_notification_permission",
    "is_notification_permission_granted",
    "desktop_get_incoming_call_state",
    "desktop_incoming_call_action",
    "get_system_theme",
    "nip96_upload",
    "nip96_upload_v2",
    "restart_app",
    "reset_app_storage",
    "desktop_open_storage_path",
    "mine_pow"
]

[[permission]]
identifier = "allow-relay-commands"
description = "Native Relay Transport commands"
commands.allow = [
    "connect_relay",
    "disconnect_relay",
    "publish_event",
    "subscribe_relay",
    "unsubscribe_relay",
    "send_relay_message",
    "probe_relay"
]

[[permission]]
identifier = "allow-wallet-commands"
description = "Native Wallet and Crypto commands"
commands.allow = [
    "get_native_npub",
    "import_native_nsec",
    "generate_native_nsec",
    "sign_event_native",
    "logout_native",
    "init_native_session",
    "clear_native_session",
    "encrypt_nip04",
    "decrypt_nip04",
    "encrypt_nip44",
    "decrypt_nip44",
    "encrypt_gift_wrap",
    "decrypt_gift_wrap",
    "get_session_nsec",
    "get_session_status"
]

[[permission]]
identifier = "allow-protocol-commands"
description = "Protocol core commands"
commands.allow = [
    "protocol_get_identity_root_state",
    "protocol_get_session_state",
    "protocol_authorize_device",
    "protocol_revoke_device",
    "protocol_x3dh_handshake",
    "protocol_get_ratchet_session",
    "protocol_verify_message_envelope",
    "protocol_publish_with_quorum",
    "protocol_check_storage_health",
    "protocol_run_storage_recovery"
]

[[set]]
identifier = "default"
description = "Default application permissions"
permissions = [
    "allow-window-commands",
    "allow-tor-commands",
    "allow-misc-commands",
    "allow-relay-commands",
    "allow-wallet-commands",
    "allow-protocol-commands"
]
