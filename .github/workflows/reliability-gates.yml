name: reliability-gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  relay-runtime-smoke:
    name: relay runtime smoke (service container)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      nostr-relay:
        image: scsibug/nostr-rs-relay:latest
        ports:
          - 7000:8080
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Wait for relay HTTP endpoint
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..30}; do
            code="$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:7000/ || true)"
            if [ "${code}" != "000" ]; then
              echo "Relay HTTP endpoint is reachable (HTTP ${code})."
              exit 0
            fi
            sleep 1
          done
          echo "Relay service did not become reachable on :7000 in time." >&2
          exit 1

      - name: Probe relay runtime (ws publish/subscribe/nip11)
        run: node scripts/relay-runtime-smoke.mjs --relay ws://127.0.0.1:7000 --timeout-ms 7000 --skip-nip11

      - name: D1 community hide suppress contract smoke
        run: node scripts/community-relay-hide-suppress-smoke.mjs

      - name: D2 hide registry persist contract smoke
        run: node scripts/community-relay-hide-registry-persist-smoke.mjs

      - name: D2 compaction SQL contract smoke
        run: node --test scripts/operator-relay-storage-compact.test.mjs

  release-test-pack:
    name: release:test-pack
    needs: [relay-runtime-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect reliability-scope changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            reliability:
              - "apps/**"
              - "packages/**"
              - "scripts/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - ".github/workflows/**"

      - name: Setup pnpm
        if: steps.changes.outputs.reliability == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        if: steps.changes.outputs.reliability == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.changes.outputs.reliability == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run release test pack (CI gate)
        if: steps.changes.outputs.reliability == 'true'
        env:
          RELEASE_TEST_PACK_SKIP_PREFLIGHT: "1"
        run: pnpm release:test-pack -- --skip-preflight

      - name: Skip release test pack (non-reliability changes only)
        if: steps.changes.outputs.reliability != 'true'
        run: echo "No reliability-scope changes detected; release:test-pack gate skipped for this run."
