name: reliability-gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-test-pack:
    name: release:test-pack
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect reliability-scope changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            reliability:
              - "apps/**"
              - "packages/**"
              - "scripts/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - ".github/workflows/**"

      - name: Setup pnpm
        if: steps.changes.outputs.reliability == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        if: steps.changes.outputs.reliability == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.changes.outputs.reliability == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run release test pack (CI gate)
        if: steps.changes.outputs.reliability == 'true'
        env:
          RELEASE_TEST_PACK_SKIP_PREFLIGHT: "1"
        run: pnpm release:test-pack -- --skip-preflight

      - name: Skip release test pack (non-reliability changes only)
        if: steps.changes.outputs.reliability != 'true'
        run: echo "No reliability-scope changes detected; release:test-pack gate skipped for this run."
