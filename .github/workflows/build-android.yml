name: Build and Release Android

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Resolve Android NDK path
        shell: bash
        run: |
          set -euo pipefail
          candidates=(
            "${ANDROID_NDK_HOME:-}"
            "${ANDROID_NDK_ROOT:-}"
            "${ANDROID_NDK_LATEST_HOME:-}"
            "${ANDROID_SDK_ROOT:-}/ndk-bundle"
            "${ANDROID_HOME:-}/ndk-bundle"
          )

          if [ -n "${ANDROID_SDK_ROOT:-}" ] && [ -d "${ANDROID_SDK_ROOT}/ndk" ]; then
            latest="$(ls -1 "${ANDROID_SDK_ROOT}/ndk" | sort -V | tail -n1 || true)"
            if [ -n "${latest}" ]; then
              candidates+=("${ANDROID_SDK_ROOT}/ndk/${latest}")
            fi
          fi

          for path in "${candidates[@]}"; do
            if [ -n "${path}" ] && [ -d "${path}" ]; then
              echo "NDK_HOME=${path}" >> "$GITHUB_ENV"
              echo "ANDROID_NDK_HOME=${path}" >> "$GITHUB_ENV"
              echo "Resolved Android NDK: ${path}"
              exit 0
            fi
          done

          echo "Failed to resolve Android NDK path." >&2
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME:-<unset>}" >&2
          echo "ANDROID_NDK_ROOT=${ANDROID_NDK_ROOT:-<unset>}" >&2
          echo "ANDROID_NDK_LATEST_HOME=${ANDROID_NDK_LATEST_HOME:-<unset>}" >&2
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-<unset>}" >&2
          echo "ANDROID_HOME=${ANDROID_HOME:-<unset>}" >&2
          exit 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Decode Keystore
        if: github.event_name != 'pull_request' && (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch')
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > apps/desktop/src-tauri/release.jks

      - name: Build Android App (Signed)
        run: pnpm -C apps/desktop tauri android build --apk --aab --ci
        env:
          TAURI_ANDROID_KEYSTORE_PATH: "release.jks"
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEYALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: obscur-android-apk
          path: apps/desktop/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: obscur-android-aab
          path: apps/desktop/src-tauri/gen/android/app/build/outputs/bundle/release/*.aab

      - name: Upload AAB to Google Play
        if: github.event_name != 'pull_request' && (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonRaw: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.obscur.desktop
          releaseFiles: apps/desktop/src-tauri/gen/android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            apps/desktop/src-tauri/gen/android/app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
