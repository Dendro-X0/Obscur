name: Build Android (Manual)

on:
  workflow_dispatch:
    inputs:
      publish_mobile_preview:
        description: "Attach APK to GitHub pre-release tag mobile-preview (for device install without full desktop release)"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Resolve Android NDK path
        shell: bash
        run: |
          set -euo pipefail
          candidates=(
            "${ANDROID_NDK_HOME:-}"
            "${ANDROID_NDK_ROOT:-}"
            "${ANDROID_NDK_LATEST_HOME:-}"
            "${ANDROID_SDK_ROOT:-}/ndk-bundle"
            "${ANDROID_HOME:-}/ndk-bundle"
          )

          if [ -n "${ANDROID_SDK_ROOT:-}" ] && [ -d "${ANDROID_SDK_ROOT}/ndk" ]; then
            latest="$(ls -1 "${ANDROID_SDK_ROOT}/ndk" | sort -V | tail -n1 || true)"
            if [ -n "${latest}" ]; then
              candidates+=("${ANDROID_SDK_ROOT}/ndk/${latest}")
            fi
          fi

          for path in "${candidates[@]}"; do
            if [ -n "${path}" ] && [ -d "${path}" ]; then
              echo "NDK_HOME=${path}" >> "$GITHUB_ENV"
              echo "ANDROID_NDK_HOME=${path}" >> "$GITHUB_ENV"
              echo "Resolved Android NDK: ${path}"
              exit 0
            fi
          done

          echo "Failed to resolve Android NDK path." >&2
          exit 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Tauri Android bridge files
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "apps/desktop/src-tauri/gen/android/tauri.settings.gradle" ]; then
            exit 0
          fi
          pnpm -C apps/desktop tauri android init || true

      - name: Decode Android keystore (optional)
        shell: bash
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > apps/desktop/src-tauri/release.jks
            echo "ANDROID_SIGNING_READY=true" >> "$GITHUB_ENV"
          else
            echo "ANDROID_SIGNING_READY=false" >> "$GITHUB_ENV"
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Prepare PWA (disable dynamic routes)
        shell: bash
        run: |
          if [ -d "apps/pwa/app/api" ]; then
            mv apps/pwa/app/api apps/pwa/app/_api_hidden
          fi
          for file in \
            apps/pwa/app/api-backup/upload/route.ts \
            apps/pwa/app/icon-192.png/route.ts \
            apps/pwa/app/icon-512.png/route.ts \
            apps/pwa/app/sw.js/route.ts \
            apps/pwa/app/apple-touch-icon.png/route.ts \
            apps/pwa/app/invites/page.tsx \
            apps/pwa/app/groups/[...id]/page.tsx
          do
            if [ -f "$file" ]; then
              mv "$file" "$file.ignored"
            fi
          done

      - name: Build PWA static export (mobile shell)
        run: node scripts/build-pwa-shell.mjs
        env:
          TAURI_SHELL_TARGET: mobile

      - name: Verify Tauri beforeBuildCommand wiring
        shell: bash
        run: |
          set -euo pipefail
          grep -q '"build:pwa-shell"' apps/desktop/package.json
          grep -q 'pnpm run build:pwa-shell' apps/desktop/src-tauri/tauri.conf.json
          test -f apps/desktop/scripts/run-build-pwa-shell.mjs
          ! grep -q '../../../scripts/build-pwa-shell' apps/desktop/src-tauri/tauri.conf.json

      - name: Build Android app (mobile shell)
        shell: bash
        run: |
          if [ "${ANDROID_SIGNING_READY}" = "true" ] \
            && [ -n "${TAURI_ANDROID_KEYSTORE_PASSWORD}" ] \
            && [ -n "${TAURI_ANDROID_KEY_ALIAS}" ] \
            && [ -n "${TAURI_ANDROID_KEY_PASSWORD}" ]; then
            pnpm -C apps/desktop tauri android build --apk --aab --ci
          else
            pnpm -C apps/desktop tauri android build --apk --aab
          fi
        env:
          TAURI_SHELL_TARGET: mobile
          SKIP_TAURI_BEFORE_BUILD: "1"
          TAURI_ANDROID_KEYSTORE_PATH: release.jks
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEYALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Collect APK path
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          apk="$(find apps/desktop/src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' | head -n1)"
          if [ -z "${apk}" ]; then
            echo "No APK produced." >&2
            find apps/desktop/src-tauri/gen/android/app/build/outputs -type f || true
            exit 1
          fi
          echo "path=${apk}" >> "$GITHUB_OUTPUT"
          echo "APK: ${apk}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: obscur-android-apk
          path: apps/desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: obscur-android-aab
          path: apps/desktop/src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: ignore

      - name: Publish mobile-preview GitHub Release
        if: inputs.publish_mobile_preview
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-preview
          name: Obscur Mobile Preview (CI)
          body: |
            Production-style Android build from `main` with `TAURI_SHELL_TARGET=mobile`.
            Use for device smoke (M1–M3) before a full desktop+mobile versioned release.
            Re-run **Build Android (Manual)** to refresh this APK.
          prerelease: true
          make_latest: false
          files: ${{ steps.apk.outputs.path }}

      - name: Upload AAB to Google Play (optional)
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonRaw: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.obscur.desktop
          releaseFiles: apps/desktop/src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          track: internal
          status: completed
