name: Obscur Full Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  preflight-checks:
    name: Preflight Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check version alignment
        run: pnpm version:check

      - name: Check docs consistency
        run: pnpm docs:check

  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    needs: preflight-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf build-essential pkg-config libssl-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare PWA (Disable Dynamic Routes)
        shell: bash
        run: |
          # Hide API directory to avoid dynamic route errors in static export
          if [ -d "apps/pwa/app/api" ]; then
            mv apps/pwa/app/api apps/pwa/app/_api_hidden
          fi
          # Disable specific route files that use dynamic segmenting
          for file in \
            apps/pwa/app/api-backup/upload/route.ts \
            apps/pwa/app/icon-192.png/route.ts \
            apps/pwa/app/icon-512.png/route.ts \
            apps/pwa/app/sw.js/route.ts \
            apps/pwa/app/apple-touch-icon.png/route.ts \
            apps/pwa/app/invites/page.tsx \
            apps/pwa/app/groups/[...id]/page.tsx
          do
            if [ -f "$file" ]; then
              mv "$file" "$file.ignored"
            fi
          done

      - name: Build Desktop Bundles
        run: pnpm -C apps/desktop tauri build
        env:
          TAURI_BUILD: true

      - name: Upload Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb

  build-android:
    name: Build Android (APK + AAB)
    needs: preflight-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      - name: Resolve Android NDK path
        shell: bash
        run: |
          set -euo pipefail
          candidates=(
            "${ANDROID_NDK_HOME:-}"
            "${ANDROID_NDK_ROOT:-}"
            "${ANDROID_NDK_LATEST_HOME:-}"
            "${ANDROID_SDK_ROOT:-}/ndk-bundle"
            "${ANDROID_HOME:-}/ndk-bundle"
          )

          if [ -n "${ANDROID_SDK_ROOT:-}" ] && [ -d "${ANDROID_SDK_ROOT}/ndk" ]; then
            latest="$(ls -1 "${ANDROID_SDK_ROOT}/ndk" | sort -V | tail -n1 || true)"
            if [ -n "${latest}" ]; then
              candidates+=("${ANDROID_SDK_ROOT}/ndk/${latest}")
            fi
          fi

          for path in "${candidates[@]}"; do
            if [ -n "${path}" ] && [ -d "${path}" ]; then
              echo "NDK_HOME=${path}" >> "$GITHUB_ENV"
              echo "ANDROID_NDK_HOME=${path}" >> "$GITHUB_ENV"
              echo "Resolved Android NDK: ${path}"
              exit 0
            fi
          done

          echo "Failed to resolve Android NDK path." >&2
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME:-<unset>}" >&2
          echo "ANDROID_NDK_ROOT=${ANDROID_NDK_ROOT:-<unset>}" >&2
          echo "ANDROID_NDK_LATEST_HOME=${ANDROID_NDK_LATEST_HOME:-<unset>}" >&2
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-<unset>}" >&2
          echo "ANDROID_HOME=${ANDROID_HOME:-<unset>}" >&2
          exit 1
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Decode Android keystore (optional)
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > apps/desktop/src-tauri/release.jks
            echo "ANDROID_SIGNING_READY=true" >> "$GITHUB_ENV"
          else
            echo "ANDROID_SIGNING_READY=false" >> "$GITHUB_ENV"
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Prepare PWA (Disable Dynamic Routes)
        shell: bash
        run: |
          if [ -d "apps/pwa/app/api" ]; then
            mv apps/pwa/app/api apps/pwa/app/_api_hidden
          fi
          for file in \
            apps/pwa/app/api-backup/upload/route.ts \
            apps/pwa/app/icon-192.png/route.ts \
            apps/pwa/app/icon-512.png/route.ts \
            apps/pwa/app/sw.js/route.ts \
            apps/pwa/app/apple-touch-icon.png/route.ts \
            apps/pwa/app/invites/page.tsx \
            apps/pwa/app/groups/[...id]/page.tsx
          do
            if [ -f "$file" ]; then
              mv "$file" "$file.ignored"
            fi
          done

      - name: Build Android App (signed if keys exist, otherwise unsigned APK)
        run: |
          if [ "${ANDROID_SIGNING_READY}" = "true" ] && [ -n "${TAURI_ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${TAURI_ANDROID_KEY_ALIAS}" ] && [ -n "${TAURI_ANDROID_KEY_PASSWORD}" ]; then
            pnpm -C apps/desktop tauri android build --apk --aab --ci
          else
            pnpm -C apps/desktop tauri android build --apk
          fi
        env:
          TAURI_ANDROID_KEYSTORE_PATH: "release.jks"
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEYALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android
          path: apps/desktop/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk

      - name: Upload AAB Artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android-aab
          path: apps/desktop/src-tauri/gen/android/app/build/outputs/bundle/release/*.aab

  ios-precheck:
    name: iOS Signing Precheck
    needs: preflight-checks
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check required iOS signing secrets
        id: check
        shell: bash
        run: |
          missing=()
          [[ -n "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" ]] || missing+=("APPLE_CERTIFICATE_BASE64")
          [[ -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ]] || missing+=("APPLE_CERTIFICATE_PASSWORD")
          [[ -n "${{ secrets.APPLE_DEVELOPMENT_TEAM }}" ]] || missing+=("APPLE_DEVELOPMENT_TEAM")
          if [ ${#missing[@]} -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Missing required iOS secrets: ${missing[*]}"
          fi

  build-ios:
    name: Build iOS (IPA)
    needs: ios-precheck
    if: ${{ needs.ios-precheck.outputs.ready == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build iOS App (Signed)
        run: pnpm -C apps/desktop tauri ios build --ci
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ios
          path: apps/desktop/src-tauri/gen/apple/build/arm64-apple-ios/release/*.ipa

  publish-release:
    name: Publish Release
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows
          path: ./release-assets/windows
      
      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos
          path: ./release-assets/macos
      
      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux
          path: ./release-assets/linux
          
      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: mobile-android
          path: ./release-assets/android

      - name: Download Android AAB Artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: mobile-android-aab
          path: ./release-assets/android

      - name: Download iOS Artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: mobile-ios
          path: ./release-assets/ios

      - name: Verify required artifact matrix
        shell: bash
        run: |
          set -euo pipefail

          required=(
            "release-assets/windows/*.exe"
            "release-assets/macos/*.dmg"
            "release-assets/linux/*.AppImage"
            "release-assets/android/*.apk"
          )

          missing=0
          for pattern in "${required[@]}"; do
            if ! compgen -G "$pattern" > /dev/null; then
              echo "Missing required release artifact pattern: $pattern" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Required artifact verification failed." >&2
            exit 1
          fi

          echo "Required artifacts verified."

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Obscur ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ./release-assets/windows/**/*
            ./release-assets/macos/**/*
            ./release-assets/linux/**/*
            ./release-assets/android/**/*
            ./release-assets/ios/**/*
