name: Obscur Full Release

# Build: tag push OR manual workflow_dispatch (re-run without burning a new tag).
# Publish: tag push OR dispatch with publish_release + optional release_tag on main.
on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish GitHub Release after verify (set release_tag when running from main)"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag (e.g. v1.8.13). Empty on tag push; on main dispatch uses package.json version."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  resolve-release-version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.resolve.outputs.semver }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag and semver
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          INPUT_TAG="${{ github.event.inputs.release_tag }}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          elif [[ -n "${INPUT_TAG}" ]]; then
            TAG="${INPUT_TAG}"
          else
            VERSION="$(node -p "require('./package.json').version")"
            TAG="v${VERSION}"
          fi
          TAG="${TAG#v}"
          TAG="v${TAG}"
          SEMVER="${TAG#v}"
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved release: tag=${TAG} semver=${SEMVER}"

  relay-runtime-smoke:
    needs: [resolve-release-version]
    name: Relay Runtime Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      nostr-relay:
        image: scsibug/nostr-rs-relay:latest
        ports:
          - 7000:8080
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Wait for relay HTTP endpoint
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..30}; do
            code="$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:7000/ || true)"
            if [ "${code}" != "000" ]; then
              echo "Relay HTTP endpoint is reachable (HTTP ${code})."
              exit 0
            fi
            sleep 1
          done
          echo "Relay service did not become reachable on :7000 in time." >&2
          exit 1

      - name: Probe relay runtime (ws publish/subscribe/nip11)
        run: node scripts/relay-runtime-smoke.mjs --relay ws://127.0.0.1:7000 --timeout-ms 7000 --skip-nip11

  preflight-checks:
    name: Preflight Checks
    needs: [resolve-release-version, relay-runtime-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release source integrity
        run: pnpm release:integrity-check

      - name: Check version alignment
        run: pnpm version:check

      - name: Check docs consistency
        run: pnpm docs:check

      # release:test-pack runs on every main push via reliability-gates — avoid duplicate ~3m gate here.

  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    needs: [preflight-checks]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: pnpm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf build-essential pkg-config libssl-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync product version (desktop)
        run: pnpm version:sync

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ matrix.os }}-cargo-tauri-${{ hashFiles('package.json', 'version.json', 'apps/desktop/src-tauri/Cargo.toml', 'apps/desktop/src-tauri/tauri.conf.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-tauri-

      - name: Prefetch Cargo dependencies (retry flaky crates.io)
        shell: bash
        working-directory: apps/desktop/src-tauri
        env:
          CARGO_NET_RETRY: 10
          CARGO_HTTP_TIMEOUT: 300
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4; do
            if cargo fetch; then
              echo "cargo fetch succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "cargo fetch failed on attempt ${attempt}; retrying in 25s..."
            sleep 25
          done
          exit 1

      - name: Prepare PWA (Disable Dynamic Routes)
        shell: bash
        run: |
          # Hide API directory to avoid dynamic route errors in static export
          if [ -d "apps/pwa/app/api" ]; then
            mv apps/pwa/app/api apps/pwa/app/_api_hidden
          fi
          # Disable specific route files that use dynamic segmenting
          for file in \
            apps/pwa/app/api-backup/upload/route.ts \
            apps/pwa/app/icon-192.png/route.ts \
            apps/pwa/app/icon-512.png/route.ts \
            apps/pwa/app/sw.js/route.ts \
            apps/pwa/app/apple-touch-icon.png/route.ts \
            apps/pwa/app/invites/page.tsx \
            apps/pwa/app/groups/[...id]/page.tsx
          do
            if [ -f "$file" ]; then
              mv "$file" "$file.ignored"
            fi
          done

      - name: Assert tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")"
          if [ "${TAG_VERSION}" != "${PKG_VERSION}" ] || [ "${TAG_VERSION}" != "${TAURI_VERSION}" ]; then
            echo "Version mismatch: tag=${TAG_VERSION} package.json=${PKG_VERSION} tauri.conf=${TAURI_VERSION}" >&2
            exit 1
          fi

      - name: Clear stale desktop bundle output
        shell: bash
        run: |
          set -euo pipefail
          rm -rf apps/desktop/src-tauri/target/release/bundle

      - name: Build Desktop Bundles
        shell: bash
        env:
          TAURI_BUILD: true
          TAURI_SHELL_TARGET: desktop
          CARGO_NET_RETRY: 10
          CARGO_HTTP_TIMEOUT: 300
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if pnpm -C apps/desktop tauri build; then
              echo "tauri build succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "tauri build failed on attempt ${attempt} (often transient crates.io curl); retrying in 30s..."
            sleep 30
          done
          exit 1

      - name: Collect bundle artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p ./bundle-artifacts
          find apps/desktop/src-tauri/target/release/bundle -type f \( -name "*.msi" -o -name "*.exe" \) -exec cp {} ./bundle-artifacts/ \;
          echo "Windows artifacts:"
          ls -la ./bundle-artifacts/

      - name: Verify desktop bundle filenames (Windows)
        if: matrix.os == 'windows-latest'
        run: node scripts/verify-desktop-bundle-filenames.mjs --dir ./bundle-artifacts

      - name: Upload Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: ./bundle-artifacts/*

      - name: Collect bundle artifacts (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p ./bundle-artifacts
          find apps/desktop/src-tauri/target/release/bundle -type f -name "*.dmg" -exec cp {} ./bundle-artifacts/ \;
          echo "macOS artifacts:"
          ls -la ./bundle-artifacts/

      - name: Verify desktop bundle filenames (macOS)
        if: matrix.os == 'macos-latest'
        run: node scripts/verify-desktop-bundle-filenames.mjs --dir ./bundle-artifacts

      - name: Upload Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: ./bundle-artifacts/*

      - name: Collect bundle artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p ./bundle-artifacts
          find apps/desktop/src-tauri/target/release/bundle -type f \( -name "*.AppImage" -o -name "*.deb" \) -exec cp {} ./bundle-artifacts/ \;
          echo "Linux artifacts:"
          ls -la ./bundle-artifacts/

      - name: Verify desktop bundle filenames (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: node scripts/verify-desktop-bundle-filenames.mjs --dir ./bundle-artifacts

      - name: Upload Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: ./bundle-artifacts/*

  build-web-pwa:
    name: Build Web/PWA (static export)
    needs: preflight-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare PWA (Disable Dynamic Routes)
        shell: bash
        run: |
          if [ -d "apps/pwa/app/api" ]; then
            mv apps/pwa/app/api apps/pwa/app/_api_hidden
          fi
          if [ -d "apps/pwa/app/api-backup" ]; then
            mv apps/pwa/app/api-backup apps/pwa/app/_api-backup_hidden
          fi
          for file in \
            apps/pwa/app/icon-192.png/route.ts \
            apps/pwa/app/icon-512.png/route.ts \
            apps/pwa/app/sw.js/route.ts \
            apps/pwa/app/apple-touch-icon.png/route.ts \
            apps/pwa/app/invites/page.tsx \
            apps/pwa/app/groups/[...id]/page.tsx
          do
            if [ -f "$file" ]; then
              mv "$file" "$file.ignored"
            fi
          done

      - name: Build PWA static export
        env:
          TAURI_BUILD: true
        run: pnpm -C apps/pwa build

      - name: Package PWA artifact
        shell: bash
        run: |
          test -f apps/pwa/out/index.html
          tar -czf obscur-pwa-static.tar.gz -C apps/pwa/out .

      - name: Upload Web/PWA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-pwa
          path: obscur-pwa-static.tar.gz
          if-no-files-found: error

  build-android:
    name: Build Android (APK + AAB)
    needs: preflight-checks
    runs-on: ubuntu-latest
    outputs:
      android_signing_state: ${{ steps.determine-signing.outputs.android_signing_state }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"
      - name: Resolve Android NDK path
        shell: bash
        run: |
          set -euo pipefail
          candidates=(
            "${ANDROID_NDK_HOME:-}"
            "${ANDROID_NDK_ROOT:-}"
            "${ANDROID_NDK_LATEST_HOME:-}"
            "${ANDROID_SDK_ROOT:-}/ndk-bundle"
            "${ANDROID_HOME:-}/ndk-bundle"
          )

          if [ -n "${ANDROID_SDK_ROOT:-}" ] && [ -d "${ANDROID_SDK_ROOT}/ndk" ]; then
            latest="$(ls -1 "${ANDROID_SDK_ROOT}/ndk" | sort -V | tail -n1 || true)"
            if [ -n "${latest}" ]; then
              candidates+=("${ANDROID_SDK_ROOT}/ndk/${latest}")
            fi
          fi

          for path in "${candidates[@]}"; do
            if [ -n "${path}" ] && [ -d "${path}" ]; then
              echo "NDK_HOME=${path}" >> "$GITHUB_ENV"
              echo "ANDROID_NDK_HOME=${path}" >> "$GITHUB_ENV"
              echo "Resolved Android NDK: ${path}"
              exit 0
            fi
          done

          echo "Failed to resolve Android NDK path." >&2
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME:-<unset>}" >&2
          echo "ANDROID_NDK_ROOT=${ANDROID_NDK_ROOT:-<unset>}" >&2
          echo "ANDROID_NDK_LATEST_HOME=${ANDROID_NDK_LATEST_HOME:-<unset>}" >&2
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-<unset>}" >&2
          echo "ANDROID_HOME=${ANDROID_HOME:-<unset>}" >&2
          exit 1
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: pnpm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync product version (Android)
        run: pnpm version:sync

      - name: Prepare Tauri Android bridge files
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "apps/desktop/src-tauri/gen/android/tauri.settings.gradle" ]; then
            echo "tauri.settings.gradle already present."
            exit 0
          fi

          echo "tauri.settings.gradle missing in clean checkout; attempting tauri android init..."
          pnpm -C apps/desktop tauri android init || true

          if [ -f "apps/desktop/src-tauri/gen/android/tauri.settings.gradle" ]; then
            echo "tauri.settings.gradle generated successfully."
            exit 0
          fi

          echo "tauri.settings.gradle still missing. Fast-fail Kotlin compile will be skipped; tauri android build remains canonical gate."

      - name: Fast-fail Kotlin compile (Android)
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "apps/desktop/src-tauri/gen/android/tauri.settings.gradle" ]; then
            echo "Skipping Kotlin fast-fail: tauri.settings.gradle not present yet."
            exit 0
          fi
          chmod +x apps/desktop/src-tauri/gen/android/gradlew
          apps/desktop/src-tauri/gen/android/gradlew \
            --project-dir apps/desktop/src-tauri/gen/android \
            :app:compileUniversalReleaseKotlin \
            --no-daemon

      - name: Decode Android keystore (optional)
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > apps/desktop/src-tauri/release.jks
            echo "ANDROID_SIGNING_READY=true" >> "$GITHUB_ENV"
          else
            echo "ANDROID_SIGNING_READY=false" >> "$GITHUB_ENV"
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Determine Android signing state
        id: determine-signing
        shell: bash
        run: |
          set -euo pipefail
          signing_state="unsigned"
          if [ "${ANDROID_SIGNING_READY:-false}" = "true" ] && [ -n "${TAURI_ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${TAURI_ANDROID_KEY_ALIAS}" ] && [ -n "${TAURI_ANDROID_KEY_PASSWORD}" ]; then
            signing_state="signed"
          fi
          echo "android_signing_state=${signing_state}" >> "$GITHUB_OUTPUT"
          echo "ANDROID_SIGNING_STATE=${signing_state}" >> "$GITHUB_ENV"
        env:
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEYALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Prepare PWA (Disable Dynamic Routes)
        shell: bash
        run: |
          if [ -d "apps/pwa/app/api" ]; then
            mv apps/pwa/app/api apps/pwa/app/_api_hidden
          fi
          for file in \
            apps/pwa/app/api-backup/upload/route.ts \
            apps/pwa/app/icon-192.png/route.ts \
            apps/pwa/app/icon-512.png/route.ts \
            apps/pwa/app/sw.js/route.ts \
            apps/pwa/app/apple-touch-icon.png/route.ts \
            apps/pwa/app/invites/page.tsx \
            apps/pwa/app/groups/[...id]/page.tsx
          do
            if [ -f "$file" ]; then
              mv "$file" "$file.ignored"
            fi
          done

      - name: Build PWA static export (mobile shell)
        run: node scripts/build-pwa-shell.mjs
        env:
          TAURI_SHELL_TARGET: mobile

      - name: Build Android App (signed if keys exist, otherwise unsigned)
        run: |
          if [ "${ANDROID_SIGNING_READY}" = "true" ] && [ -n "${TAURI_ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${TAURI_ANDROID_KEY_ALIAS}" ] && [ -n "${TAURI_ANDROID_KEY_PASSWORD}" ]; then
            pnpm -C apps/desktop tauri android build --apk --aab --ci
          else
            pnpm -C apps/desktop tauri android build --apk --aab
          fi
        env:
          TAURI_SHELL_TARGET: mobile
          SKIP_TAURI_BEFORE_BUILD: "1"
          TAURI_ANDROID_KEYSTORE_PATH: "release.jks"
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEYALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Debug Android output tree
        shell: bash
        run: |
          set -euo pipefail
          echo "Android output tree (apk/bundle):"
          find apps/desktop/src-tauri/gen/android/app/build/outputs -maxdepth 6 -type f | sort || true
          aab_count="$(find apps/desktop/src-tauri/gen/android/app/build/outputs/bundle -type f -iname '*.aab' 2>/dev/null | wc -l | tr -d ' ')"
          bundle_meta_count="$(find apps/desktop/src-tauri/gen/android/app/build/outputs/bundle -type f -name 'output-metadata.json' 2>/dev/null | wc -l | tr -d ' ')"
          echo "aab_files=${aab_count} bundle_metadata_files=${bundle_meta_count}"
          if [ "${aab_count}" -lt 1 ]; then
            echo "Android build did not produce an AAB under outputs/bundle." >&2
            exit 1
          fi
          if [ "${bundle_meta_count}" -lt 1 ]; then
            echo "::warning::Bundle output-metadata.json missing; verify-artifacts will fall back to APK metadata versionName for AAB parity."
          fi

      - name: Upload Android Artifacts (APK + AAB)
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android
          path: |
            apps/desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            apps/desktop/src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: error

      - name: Upload Android Build Metadata
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android-metadata
          path: |
            apps/desktop/src-tauri/gen/android/app/build/outputs/apk/**/output-metadata.json
            apps/desktop/src-tauri/gen/android/app/build/outputs/bundle/**/output-metadata.json
          if-no-files-found: error

      - name: Android signing summary
        shell: bash
        run: |
          {
            echo "### Android Build Status";
            echo "- Android signing state: ${ANDROID_SIGNING_STATE}";
          } >> "$GITHUB_STEP_SUMMARY"

  ios-precheck:
    name: iOS Signing Precheck
    needs: preflight-checks
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      ios_lane_state: ${{ steps.check.outputs.ios_lane_state }}
    steps:
      - name: Check required iOS signing secrets
        id: check
        shell: bash
        run: |
          missing=()
          [[ -n "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" ]] || missing+=("APPLE_CERTIFICATE_BASE64")
          [[ -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ]] || missing+=("APPLE_CERTIFICATE_PASSWORD")
          [[ -n "${{ secrets.APPLE_DEVELOPMENT_TEAM }}" ]] || missing+=("APPLE_DEVELOPMENT_TEAM")
          if [ ${#missing[@]} -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "ios_lane_state=executed" >> "$GITHUB_OUTPUT"
            echo "### iOS Lane Status" >> "$GITHUB_STEP_SUMMARY"
            echo "- iOS lane state: executed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "ios_lane_state=skipped_missing_secrets" >> "$GITHUB_OUTPUT"
            echo "Missing required iOS secrets: ${missing[*]}"
            echo "### iOS Lane Status" >> "$GITHUB_STEP_SUMMARY"
            echo "- iOS lane state: skipped_missing_secrets" >> "$GITHUB_STEP_SUMMARY"
            echo "- Missing secrets: ${missing[*]}" >> "$GITHUB_STEP_SUMMARY"
          fi

  build-ios:
    name: Build iOS (IPA)
    needs: [preflight-checks]
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check iOS signing secrets
        id: check-ios-secrets
        shell: bash
        run: |
          if [[ -n "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" && -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" && -n "${{ secrets.APPLE_DEVELOPMENT_TEAM }}" ]]; then
            echo "ios_signing_ready=true" >> "$GITHUB_OUTPUT"
            echo "iOS signing secrets available - will build signed IPA"
          else
            echo "ios_signing_ready=false" >> "$GITHUB_OUTPUT"
            echo "iOS signing secrets missing - will attempt unsigned build"
          fi

      - name: Install Apple Certificate (if available)
        if: steps.check-ios-secrets.outputs.ios_signing_ready == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build iOS App (Signed)
        if: steps.check-ios-secrets.outputs.ios_signing_ready == 'true'
        run: pnpm -C apps/desktop tauri ios build --ci
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Build iOS App (Unsigned)
        if: steps.check-ios-secrets.outputs.ios_signing_ready != 'true'
        run: |
          echo "Building unsigned iOS app (simulator target)..."
          cd apps/desktop
          pnpm tauri ios build --target aarch64-apple-ios-sim
        continue-on-error: true

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-ios
          path: apps/desktop/src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: ignore

  verify-artifacts:
    name: Verify Artifacts
    needs: [resolve-release-version, preflight-checks, build-desktop, build-web-pwa, build-android, build-ios]
    if: ${{ always() && needs.preflight-checks.result == 'success' && needs.build-desktop.result == 'success' && needs.build-web-pwa.result == 'success' && needs.build-android.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows
          path: ./release-assets/windows
      
      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos
          path: ./release-assets/macos
      
      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux
          path: ./release-assets/linux
          
      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: mobile-android
          path: ./release-assets/android

      - name: Download Android Metadata
        uses: actions/download-artifact@v4
        with:
          name: mobile-android-metadata
          path: ./release-assets/android

      - name: Download Web/PWA Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-pwa
          path: ./release-assets/web

      - name: Download iOS Artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: mobile-ios
          path: ./release-assets/ios
      
      - name: Build streaming update assets from downloaded artifacts
        shell: bash
        run: |
          mkdir -p release-assets/streaming-update
          pnpm release:streaming-update-manifest:build -- --assets-dir release-assets --output release-assets/streaming-update/streaming-update-policy.json --release-notes-url "https://github.com/${{ github.repository }}/releases/latest"
          echo "Skipping Tauri updater feed generation (unsigned builds by design)."

      - name: Upload streaming update assets
        uses: actions/upload-artifact@v4
        with:
          name: streaming-update-assets
          path: release-assets/streaming-update
          if-no-files-found: error

      # Run release artifact version parity check (desktop + android)
      - name: Verify release artifacts (matrix + version parity)
        env:
          ANDROID_JOB_RESULT: ${{ needs.build-android.result }}
          EXPECTED_VERSION: ${{ needs.resolve-release-version.outputs.semver }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Release asset tree:"
          find release-assets -maxdepth 4 -type f | sort || true

          has_windows_installer=0
          find release-assets/windows -type f \( -iname "*.exe" -o -iname "*.msi" \) | grep -q . && has_windows_installer=1
          has_macos_installer=0
          find release-assets/macos -type f -iname "*.dmg" | grep -q . && has_macos_installer=1
          has_linux_installer=0
          find release-assets/linux -type f \( -iname "*.appimage" -o -iname "*.deb" \) | grep -q . && has_linux_installer=1
          has_android_apk=0
          find release-assets/android -type f -iname "*.apk" | grep -q . && has_android_apk=1
          has_android_aab=0
          find release-assets/android -type f -iname "*.aab" | grep -q . && has_android_aab=1
          has_web_bundle=0
          find release-assets/web -type f -iname "*.tar.gz" | grep -q . && has_web_bundle=1

          echo "Artifact matrix: win=${has_windows_installer} mac=${has_macos_installer} linux=${has_linux_installer} apk=${has_android_apk} aab=${has_android_aab} web=${has_web_bundle}"

          missing=0
          [ "$has_windows_installer" -eq 1 ] || { echo "Missing Windows installer." >&2; missing=1; }
          [ "$has_macos_installer" -eq 1 ] || { echo "Missing macOS installer." >&2; missing=1; }
          [ "$has_linux_installer" -eq 1 ] || { echo "Missing Linux installer." >&2; missing=1; }
          [ "${ANDROID_JOB_RESULT}" = "success" ] || { echo "Android job failed: ${ANDROID_JOB_RESULT}" >&2; missing=1; }
          [ "$has_android_apk" -eq 1 ] || { echo "Missing Android APK." >&2; missing=1; }
          [ "$has_android_aab" -eq 1 ] || { echo "Missing Android AAB." >&2; missing=1; }
          [ "$has_web_bundle" -eq 1 ] || { echo "Missing Web/PWA bundle." >&2; missing=1; }
          [ "$missing" -eq 0 ] || exit 1

          pnpm release:artifact-version-parity -- --assets-dir release-assets --expected-version "${EXPECTED_VERSION}"

      - name: Release lane summary
        shell: bash
        run: |
          {
            echo "### Release Lane Summary";
            echo "- release_tag: ${{ needs.resolve-release-version.outputs.tag }}";
            echo "- android_job_result: ${{ needs.build-android.result }}";
            echo "- android_signing_state: ${{ needs.build-android.outputs.android_signing_state != '' && needs.build-android.outputs.android_signing_state || 'unavailable' }}";
            echo "- desktop_signing_state: unsigned (by design)";
            echo "- ios_lane_state: ${{ needs.ios-precheck.outputs.ios_lane_state }}";
            echo "- verify: single matrix + parity step";
          } >> "$GITHUB_STEP_SUMMARY"

  publish-release:
    name: Publish Release
    needs: [resolve-release-version, verify-artifacts]
    if: ${{ needs.verify-artifacts.result == 'success' && github.event_name == 'workflow_dispatch' && inputs.publish_release == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows
          path: ./release-assets/windows

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos
          path: ./release-assets/macos

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux
          path: ./release-assets/linux

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: mobile-android
          path: ./release-assets/android

      - name: Download Android Metadata
        uses: actions/download-artifact@v4
        with:
          name: mobile-android-metadata
          path: ./release-assets/android

      - name: Download Web/PWA Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-pwa
          path: ./release-assets/web

      - name: Download iOS Artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: mobile-ios
          path: ./release-assets/ios

      - name: Download Streaming Update Manifest
        uses: actions/download-artifact@v4
        with:
          name: streaming-update-assets
          path: ./release-assets/streaming-update

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./release-files
          VERSION="${{ needs.resolve-release-version.outputs.semver }}"
          TAG="${{ needs.resolve-release-version.outputs.tag }}"

          copy_desktop_installer() {
            local src="$1"
            local base
            base="$(basename "$src")"
            if ! echo "$base" | grep -qE "(^|[._-])${VERSION}([._-]|$)"; then
              echo "Desktop installer built with wrong version in filename: ${base} (expected ${VERSION})" >&2
              exit 1
            fi
            cp "$src" "./release-files/${base}"
          }

          # Desktop installers (must already embed tag version — no filename rename)
          while IFS= read -r installer; do
            [ -n "$installer" ] || continue
            copy_desktop_installer "$installer"
          done < <(find ./release-assets/windows ./release-assets/macos ./release-assets/linux \
            -type f \( -iname "*.exe" -o -iname "*.msi" -o -iname "*.dmg" -o -iname "*.AppImage" -o -iname "*.deb" \) 2>/dev/null | sort)

          copy_matches() {
            local pattern="$1"
            for file in $pattern; do
              if [ -f "$file" ]; then
                cp "$file" ./release-files/
              fi
            done
          }

          # Mobile deliverables (APK/AAB live in nested Gradle output dirs)
          while IFS= read -r apk; do
            [ -n "$apk" ] || continue
            cp "$apk" "./release-files/Obscur_${VERSION}_$(basename "$apk")"
          done < <(find ./release-assets/android -type f -iname "*.apk" | sort)

          while IFS= read -r aab; do
            [ -n "$aab" ] || continue
            cp "$aab" "./release-files/Obscur_${VERSION}_$(basename "$aab")"
          done < <(find ./release-assets/android -type f -iname "*.aab" | sort)

          find ./release-assets/android -type f -name "output-metadata.json" -exec cp {} ./release-files/ \;

          if ! find ./release-files -maxdepth 1 -type f -iname "*.apk" | grep -q .; then
            echo "No Android APK collected for release upload." >&2
            find ./release-assets/android -type f | sort || true
            exit 1
          fi

          # Web/PWA bundle
          copy_matches "./release-assets/web/*.tar.gz"

          # Release policy / feed assets
          copy_matches "./release-assets/streaming-update/streaming-update-policy.json"
          copy_matches "./release-assets/streaming-update/latest.json"

          # Optional iOS IPA
          copy_matches "./release-assets/ios/*.ipa"

          echo "Files to be released:"
          ls -la ./release-files/
          echo "Total release files: $(ls ./release-files/ | wc -l)"

          while IFS= read -r desktop_file; do
            [ -n "$desktop_file" ] || continue
            if ! echo "$(basename "$desktop_file")" | grep -qE "(^|[._-])${VERSION}([._-]|$)"; then
              echo "Desktop installer missing version ${VERSION}: ${desktop_file}" >&2
              exit 1
            fi
          done < <(find ./release-files -maxdepth 1 -type f \( -iname "*.exe" -o -iname "*.msi" -o -iname "*.dmg" -o -iname "*.AppImage" \) | sort)

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release-version.outputs.tag }}
          name: "Obscur ${{ needs.resolve-release-version.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ./release-files/*
