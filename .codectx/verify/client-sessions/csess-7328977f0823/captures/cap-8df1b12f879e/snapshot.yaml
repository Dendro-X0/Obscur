      - paragraph: The relay baseline includes custom relays beyond the public defaults, which can justify an advanced managed-workspace path when operators are trusted.
      - paragraph: Treat Managed Workspace as opt-in only for teams that intentionally configured these relays and accept the extra operational assumptions.
