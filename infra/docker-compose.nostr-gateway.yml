# Optional: nostr-rs-relay + Obscur relay-gateway (D1 hide suppress on :7000).
# Usage: docker compose -f infra/docker-compose.nostr-gateway.yml up
services:
  nostr-relay:
    image: scsibug/nostr-rs-relay:latest
    expose:
      - "8080"
    volumes:
      - ./nostr/nostr-rs-relay.toml:/usr/src/app/config.toml:ro
      - nostr-relay-data:/usr/src/app/db

  relay-gateway:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npx tsx src/index.ts"
    environment:
      PORT: "7001"
      UPSTREAM_URL: ws://nostr-relay:8080
      OBSCUR_RELAY_HIDE_SUPPRESS: "1"
    volumes:
      - ../apps/relay-gateway:/app
    ports:
      - "7000:7001"
    depends_on:
      - nostr-relay

volumes:
  nostr-relay-data:
