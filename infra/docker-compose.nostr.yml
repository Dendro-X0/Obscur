services:
  nostr-relay:
    image: scsibug/nostr-rs-relay:latest
    ports:
      - "7000:8080"
    volumes:
      # Paths are relative to this compose file (infra/).
      - ./nostr/nostr-rs-relay.toml:/usr/src/app/config.toml:ro
      - nostr-relay-data:/usr/src/app/db
    # Do not override command: the image ENTRYPOINT is nostr-rs-relay; a bare
    # ["--config", "..."] replaces CMD and Docker tries to exec "--config".

volumes:
  nostr-relay-data:
